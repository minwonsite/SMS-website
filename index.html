               <h2><br/>
                 <a onclick="var message='존경하는 의원님%0a%0aOOO시 OOO동에 거주하는 OOO 입니다. %0a%0a1.현실과 동떨어진 주차장 및 건축 기준 문제%0a%0a최근 당정협의를 통해 논의된 근생빌라 양성화 방안 중 주차장 확보 기준과 건축 요건은 구조적·경제적 현실을 고려할 때 서민 피해자가 충족하기 어려운 수준입니다. 또한 다세대형 근생빌라는 대부분 4개 층, 연면적 660㎡를 초과하는 구조로 건축되어 있어 현행 기준을 그대로 적용할 경우 사실상 양성화가 불가능한 경우가 많습니다. 이미 실거주 중인 서민들에게 추가적인 주차장 확보나 막대한 비용 부담을 요구하는 것은 현실적으로 이행이 어려워 상당수 피해자가 제도권 밖으로 배제될 우려가 있습니다. 따라서 피해 구제를 목적으로 하는 양성화 제도라면 구조적 현실을 반영한 실현 가능한 기준 마련을 요청 드립니다. %0a%0a2. LH 전세사기 피해주택 매입 기준과의 형평성 문제 %0a%0a현재 전세사기 특별법에 따라 LH가 피해 주택을 매입하는 과정에서는 근생빌라 세입자의 주거 안정을 위해 주차장 기준 등 일부 요건이 완화되어 적용되고 있습니다. 그러나 동일한 건물에서 실거주 목적으로 분양을 받아 거주 중인 근생빌라 매수자에게는 여전히 엄격한 주차장 기준 등이 적용되어 사실상 양성화가 어려운 상황입니다. 같은 건물, 같은 주거 환경임에도 불구하고 차별이 발생하고 있는 만큼 근생빌라 분양 피해자들에게도 동일하게 주거로 거주할 수 있도록 제도적 개선을 요청드립니다%0a%0a3. 국토부 상가 매입 공공임대 정책과의 정책 일관성 문제%0a%0a최근 국토부는 주택 공급 확대를 위해 상가 건물을 매입해 공공임대주택으로 활용하는 정책을 추진하고 있습니다. 그러나 동일한 형태의 건물에서 실거주 중인 근생빌라 분양 피해자에게는 엄격한 기준을 적용해 구제를 제한하고 있어 정책의 형평성과 일관성 논란이 제기될 수 있습니다. 따라서 근생빌라 실거주 피해자들에게도 현실적인 기준을 적용해 양성화 및 제도권 편입의 길을 열어주시기를 요청 드립니다.%0a%0a4. 피해 회복 중심의 실효성 있는 양성화 필요 %0a%0a부디 피해 회복을 중심에 둔 실효성 있는 양성화 기준을 마련해 주시고, 근생빌라 실거주 피해자들이 제도의 사각지대에 놓이지 않도록 특별법을 통해 관련 법령 전반에 한시적인 구제 통로를 마련해 주시길 간곡히 요청드립니다. ';var userAgent = navigator.userAgent.toLowerCase().indexOf('android') > -1;setAttribute('href', 'sms:' + (userAgent ? '' : '/open?addresses=') +
